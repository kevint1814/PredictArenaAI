name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/predicarena
            git pull origin main
            venv/bin/pip install --quiet -r requirements.txt
            systemctl restart predicarena
            sleep 3
            systemctl is-active predicarena \
              && echo "Bot is live ✅" \
              || (journalctl -u predicarena -n 30 --no-pager; exit 1)
